{% extends "base.html" %}

{% block extrahead %}
    {{ super() }}
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "{{ config.site_name }}",
        "url": "{{ config.site_url }}",
        "description": "IE 架构手册 - 分享架构设计、技术实践和运维经验",
        "potentialAction": {
            "@type": "SearchAction",
            "target": "{{ config.site_url }}?q={search_term_string}",
            "query-input": "required name=search_term_string"
        }
    }
    </script>
{% endblock %}

{% block content %}
    {{ super() }}
    
    {% if page.meta %}
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Article",
        "headline": "{{ page.title }}",
        "description": "{{ page.meta.description | default(page.title, true) }}",
        "mainEntityOfPage": {
            "@type": "WebPage",
            "@id": "{{ page.canonical_url }}"
        },
        "datePublished": "{{ page.meta.date | default("") }}",
        "dateModified": "{{ page.meta.modified | default("") }}",
        "author": {
            "@type": "Person",
            "name": "H4nk"
        },
        "publisher": {
            "@type": "Organization",
            "name": "{{ config.site_name }}",
            "logo": {
                "@type": "ImageObject",
                "url": "{{ config.site_url }}assets/images/logo.png"
            }
        }
    }
    </script>
    {% endif %}
{% endblock %}
