site_author: H4nk
site_url: https://h4nkx.github.io/

docs_dir: docs

repo_name: H4nkX/H4nkX.github.io
repo_url: https://github.com/H4nkX/H4nkX.github.io

copyright: Copyright &copy; 2026 H4nk

nav:
  - 首页: index.md
  - About: about/index.md
  - 实记:
    - 关于实记: story/index.md
    - PCA 驱动的工艺告警系统重构：从报警洪水到智能预警的工业级实践: story/story1/index.md
    - 实记2: story/story2/index.md
    - 实记3: story/story3/index.md
  - AI:
    - 关于AI: ai/index.md
    - Prompt Inject for Expert dataset: ai/prompt-inject.md
    - GBT 42131-2022: ai/GBT+42131-2022.md
  - 运筹学:
    - 关于运筹学: yunchou/index.md
    - 教学: yunchou/teach/index.md
  - 概率论:
    - 关于概率论: gailvlun/index.md
    - 看见概率: gailvlun/seeing-theory.md
  - 配置: config/index.md

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
  
  features:
    # 导航系统功能
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.tabs.fade
    - navigation.tabs.scroll
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - navigation.path
    - navigation.instant
    - navigation.prune
    - navigation.sitemap
    - navigation.hover.preview
    - navigation.hover.delay
    - navigation.hover.refresh
    
    # 搜索功能
    - search.suggest
    - search.highlight
    - search.share
    
    # 内容功能
    - toc.follow
    - content.code.copy
    - content.code.select
    - content.code.annotate
    
    # 界面功能
    - header.autohide

  language: zh
  
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  # 代码相关扩展
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - codehilite:
      linenums: true
  
  # 内容组织扩展
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - def_list
  - abbr
  - footnotes
  - tables
  
  # 格式美化扩展
  - attr_list
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.smartsymbols
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  
  # 数学公式扩展
  - pymdownx.arithmatex:
      generic: true
  
  # 高级功能扩展
  - pymdownx.keys
  - pymdownx.escapeall:
      hardbreak: true
      nbsp: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.critic

plugins:
  - search
  - minify:
      minify_html: true
      minify_css: true
      minify_js: true

# 性能优化配置
extra_javascript:
  - https://cdn.jsdelivr.net/npm/lazysizes@5.3.2/lazysizes.min.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js
  - javascripts/math-image.js

extra_css:
  - https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css
  - assets/css/custom.css

# 缓存控制
extra:
  cache:
    enabled: true
    duration: 86400  # 24小时

  analytics:
    provider: google
    property: G-XXXXXXXXXX

watch:
  - docs