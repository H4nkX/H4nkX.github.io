site_name: IE Arch Handbook_H4nk
site_description: 工业工程架构师手册
site_author: H4nk
site_url: https://h4nkx.github.io/

repo_name: H4nkX/H4nkX.github.io
repo_url: https://github.com/H4nkX/H4nkX.github.io

copyright: Copyright &copy; 2026 H4nk

nav:
  - 首页: index.md
  - 博客:
    - 博客首页: blog/index.md
    - 分类:
      - 随笔: blog/category/随笔/index.md
    - 归档:
      - 2024: blog/archive/2024/index.md
  - 故事:
    - 故事首页: story/index.md
    - 故事1: story/story1/index.md
    - 故事2: story/story2/index.md
    - 故事3: story/story3/index.md
  - AI专栏:
    - AI专栏首页: ai/index.md
  - 云筹:
    - 云筹首页: yunchou/index.md
    - 教学: yunchou/teach/index.md
  - 配置: config/index.md

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
    - content.action.edit
    - content.action.view

  language: zh
  
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search
  - minify:
      minify_html: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/H4nkX
    - icon: fontawesome/brands/weixin
      link: https://mp.weixin.qq.com/

  analytics:
    provider: google
    property: G-XXXXXXXXXX

extra_css:
  - assets/css/custom.css

watch:
  - docs